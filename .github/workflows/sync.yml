name: Sync from Notion & Deploy

on:
  push:
    branches: [main]
  schedule:
    - cron: '30 3 * * *' # nightly
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  sync-build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Sync content from Notion
        if: github.event_name != 'push'
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: node scripts/sync.mjs

      - name: Commit synced content
        if: github.event_name != 'push'
        run: |
          git config user.name "runar-museum-bot"
          git config user.email "actions@github.com"
          git add content public/images
          if ! git diff --cached --quiet; then
            git commit -m "sync: update minis from Notion"
            git push
          else
            echo "No content changes."
          fi

      - name: Build site
        run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

      - id: deployment
        uses: actions/deploy-pages@v4
